name: Scraper Deploy

on:
  push:
    branches: [main]
    paths:
      - "packages/scraper/**"
      - ".github/workflows/scraper-deploy.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    # Map the secret to env here so it can be referenced in a step `if:`.
    # `secrets` is NOT allowed directly in `if:` — doing so aborts the run with
    # "No jobs were run".
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          # npm workspaces: one lockfile at the repo root, not per package.
          cache-dependency-path: package-lock.json

      - name: Install dependencies (workspaces)
        run: npm ci

      - name: Build scraper
        run: npm run build --workspace packages/scraper

      - name: Deploy to Railway
        if: ${{ env.RAILWAY_TOKEN != '' }}
        run: echo "Configure Railway CLI deploy with RAILWAY_TOKEN secret"
