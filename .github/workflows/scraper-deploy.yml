name: Scraper Deploy

on:
  push:
    branches: [main]
    paths:
      - "packages/scraper/**"
      - ".github/workflows/scraper-deploy.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/scraper

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: packages/scraper/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Railway
        if: ${{ secrets.RAILWAY_TOKEN != '' }}
        run: echo "Configure Railway CLI deploy with RAILWAY_TOKEN secret"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
