name: Admin Deploy

on:
  push:
    branches: [main]
    paths:
      - "apps/admin/**"
      - ".github/workflows/admin-deploy.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    # Map the secret to env so it can be used in a step `if:` (secrets are not
    # allowed directly in `if:` — that aborts the run with "No jobs were run").
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          # npm workspaces: one lockfile at the repo root, not per package.
          cache-dependency-path: package-lock.json

      - name: Install dependencies (workspaces)
        run: npm ci

      - name: Build admin
        run: npm run build --workspace apps/admin
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Deploy to Vercel
        if: ${{ env.VERCEL_TOKEN != '' }}
        run: echo "Configure Vercel deploy with VERCEL_TOKEN secret"
